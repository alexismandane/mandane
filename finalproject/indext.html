<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSys 1 - Product Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Alexis's store</h1>
        <div class="cart-icon-container">
            🛒 Cart <span id="cart-badge">0</span>
        </div>
    </header>

    <main class="container">
        <section id="product-list" class="product-grid">
            </section>

        <aside id="shopping-cart" class="cart-section">
            <h2>Your Cart</h2>
            <div id="cart-items">
                </div>
            <div id="cart-empty-msg">Your cart is empty.</div>
            
            <hr>
            <div class="cart-summary">
                <p>Total: $ <span id="cart-total">0.00</span></p>
                <button id="clear-cart-btn" class="btn-danger">Clear Cart</button>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
